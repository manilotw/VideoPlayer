<html>
  <head>
    <meta charset="UTF-8">
    <title>Видео</title>
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="icon" href="fonts/video-svgrepo-com.svg" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body {
        display: flex;
      }

      .player {
        width: 800px;
        height: 600px;
        display: flex;
        flex-direction: column;
      }

      .display {
        flex-grow: 1;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .player__controls {
        background: black;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px;
      }

      .player__controls-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .player__button {
        border: none;
        cursor: pointer;
        background: transparent;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 0;
      }

      .player__icon {
        color: white;
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <div id="player" class="player">
      <div class="js-video-container display"></div>

      <div class="player__controls">
        <div class="player__controls-left">
          <button class="js-play-button player__button">
            <i class="fa fa-play player__icon" aria-hidden="true"></i>
          </button>

          <button class="js-pause-button player__button" hidden>
            <i class="fa fa-pause player__icon" aria-hidden="true"></i>
          </button>

          <button class="js-volume-button player__button">
            <i class="fa fa-volume-up player__icon" aria-hidden="true"></i>
          </button>

          <button class="js-mute-button player__button" hidden>
            <i class="fa fa-volume-off player__icon" aria-hidden="true"></i>
          </button>
        </div>

        <button class="js-fullscreen-button player__button">
          <i class="fa fa-expand player__icon" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <script src="http://localhost:35729/livereload.js"></script>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
    <script src="player.js"></script>
    <script type="text/javascript">
      createPlayer({elementId: 'player'});
    </script>
  </body>
</html>
